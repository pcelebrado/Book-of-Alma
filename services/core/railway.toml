# =============================================================================
# OpenClaw Core Service — Railway Config-as-Code
# CONSOLIDATED SERVICE: OpenClaw + MongoDB + QMD + SFTPGo
# =============================================================================
# Must use Dockerfile — this container runs multiple processes (mongod,
# sftpgo, node) that Railpack cannot orchestrate.
# Environment variables are configured via Railway dashboard or
# Raw Editor (see .env.railway for copy-paste values).
# =============================================================================

[build]
builder = "DOCKERFILE"
watchPatterns = [
  "/services/core/**",
  "!**/node_modules/**",
  "!**/*.test.js"
]

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Persistent volume at /data — Railway attaches on deploy.
# Layout: /data/db, /data/log, /data/.openclaw, /data/workspace,
#         /data/book-source, /data/sftpgo
requiredMountPath = "/data"
