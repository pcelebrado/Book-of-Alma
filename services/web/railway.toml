# =============================================================================
# OpenClaw Web Service - Railway Configuration
# PUBLIC SERVICE (the only public HTTP surface)
# =============================================================================
# Next.js 14 frontend with standalone output.
# Railway monorepo auto-import detects this file at the workspace package root.
# =============================================================================

[build]
builder = "DOCKERFILE"
watchPatterns = [
  "/services/web/**",
  "!**/node_modules/**",
  "!**/*.test.ts",
  "!**/*.test.tsx"
]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
# ---------------------------------------------------------------------------
# Next.js settings
# ---------------------------------------------------------------------------
NEXT_TELEMETRY_DISABLED = "1"

# Hostname binding for IPv4/IPv6 dual-stack support.
HOSTNAME = "::"

# ---------------------------------------------------------------------------
# MongoDB — connects to the embedded MongoDB inside the core service
# Uses Railway private networking (core.railway.internal).
# ---------------------------------------------------------------------------
MONGODB_URI = "mongodb://${{ openclaw-core.RAILWAY_PRIVATE_DOMAIN }}:27017/openclaw"

# ---------------------------------------------------------------------------
# Internal Core Service — web talks to core over private networking
# ---------------------------------------------------------------------------
INTERNAL_CORE_BASE_URL = "http://${{ openclaw-core.RAILWAY_PRIVATE_DOMAIN }}:8080"

# ---------------------------------------------------------------------------
# Service-to-service auth token — must match core service
# References the same generated secret from core so they always stay in sync.
# ---------------------------------------------------------------------------
INTERNAL_SERVICE_TOKEN = "${{ openclaw-core.INTERNAL_SERVICE_TOKEN }}"

# ---------------------------------------------------------------------------
# Auth.js / NextAuth
# AUTH_SECRET encrypts sessions. Auto-generated on deploy.
# AUTH_URL and NEXT_PUBLIC_APP_URL use the Railway-assigned public domain.
# ---------------------------------------------------------------------------
AUTH_SECRET = "${{ secret(43, \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+/\") }}="
AUTH_URL = "https://${{ RAILWAY_PUBLIC_DOMAIN }}"
NEXT_PUBLIC_APP_URL = "https://${{ RAILWAY_PUBLIC_DOMAIN }}"

# ---------------------------------------------------------------------------
# Book content defaults (can be customized later)
# ---------------------------------------------------------------------------
BOOK_SOURCE_MODE = "external"
BOOK_SOURCE_DIR = "/data/book-source"
BOOK_IMPORT_MANIFEST = "/data/book-source/manifest.json"
BOOK_CANONICAL_COLLECTION = "book_sections"
BOOK_TOC_COLLECTION = "book_toc"
BOOK_IMPORT_ENABLED = "false"
BOOK_IMPORT_DRY_RUN = "true"
