# =============================================================================
# OpenClaw Web Service — Railway Config-as-Code
# PUBLIC SERVICE (the only public HTTP surface)
# =============================================================================
# Railpack auto-detects Next.js, installs deps, builds, and starts.
# Environment variables are configured via Railway dashboard or
# Raw Editor (see .env.railway for copy-paste values).
# IMPORTANT: Attach a Railway volume to this service at /data so
# SQLITE_DB_PATH=/data/web.db persists across deploys.
# =============================================================================

[build]
builder = "RAILPACK"
watchPatterns = [
  "/services/web/**",
  "!**/node_modules/**",
  "!**/*.test.ts",
  "!**/*.test.tsx"
]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
